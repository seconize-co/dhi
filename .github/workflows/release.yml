name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            package: dhi-linux-amd64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm linux-headers-generic linux-tools-common linux-tools-generic

      - name: Rebuild bundled eBPF object
        run: |
          BPFTOOL_BIN="$(command -v bpftool || true)"
          if [ -z "$BPFTOOL_BIN" ]; then
            BPFTOOL_BIN="$(ls /usr/lib/linux-tools/*/bpftool 2>/dev/null | head -n1 || true)"
          fi
          if [ -z "$BPFTOOL_BIN" ]; then
            echo "bpftool not found after dependency install" >&2
            exit 1
          fi
          "$BPFTOOL_BIN" btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
          clang -O2 -g -target bpf -I bpf -c bpf/dhi_ssl.bpf.c -o bpf/dhi_ssl.bpf.o
          test -s bpf/dhi_ssl.bpf.o

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        run: |
          mkdir -p dist/usr/local/bin dist/usr/share/dhi dist/etc/dhi
          cp target/${{ matrix.target }}/release/dhi dist/usr/local/bin/dhi
          cp bpf/dhi_ssl.bpf.o dist/usr/share/dhi/dhi_ssl.bpf.o
          cp dhi.toml.example dist/etc/dhi/dhi.toml.example
          tar -C dist -czf ${{ matrix.package }} usr etc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: ${{ matrix.package }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
