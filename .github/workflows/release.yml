name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            package: dhi-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            package: dhi-linux-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install eBPF build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang linux-tools-common

      - name: Generate vmlinux.h for eBPF build
        run: |
          BPFOOL_BIN="$(command -v bpftool || true)"
          if [ -z "$BPFOOL_BIN" ]; then
            BPFOOL_BIN="$(find /usr/lib/linux-tools -type f -name bpftool | head -n 1)"
          fi
          if [ -z "$BPFOOL_BIN" ]; then
            echo "bpftool not found after installing linux-tools-common"
            exit 1
          fi
          "$BPFOOL_BIN" btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross pkg-config libssl-dev:arm64

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux ARM64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build eBPF object
        run: clang -O2 -target bpf -c bpf/dhi_ssl.bpf.c -o bpf/dhi_ssl.bpf.o

      - name: Package binary (Unix)
        run: |
          mkdir -p dist/usr/local/bin dist/usr/share/dhi dist/etc/dhi
          cp target/${{ matrix.target }}/release/dhi dist/usr/local/bin/dhi
          cp bpf/dhi_ssl.bpf.o dist/usr/share/dhi/dhi_ssl.bpf.o
          cp dhi.toml.example dist/etc/dhi/dhi.toml.example
          tar -C dist -czf ${{ matrix.package }} usr etc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: ${{ matrix.package }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
